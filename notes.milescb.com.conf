server {
    listen 80;
    listen [::]:80;
    server_name notes.milescb.com;

    access_log /var/log/nginx/notes.access.log;
    error_log  /var/log/nginx/notes.error.log;

    # Sidecar handles everything:
    #   GET /           → index page
    #   GET /<slug>     → proxy to Joplin share with CSS + nav injected
    #   GET /api/shares → JSON list for the nav script
    location / {
        proxy_pass         http://127.0.0.1:3456;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sidecar sets Content-Type; don't let Nginx second-guess it
        proxy_pass_header  Content-Type;
    }
}
